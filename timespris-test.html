<!doctype html><html lang="no"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Er timesprisen din for lav? – Økonomikalk</title><meta name="description" content="Fyll inn ønsket inntekt, kostnader og fakturerbare timer. Få et raskt forslag til timespris eks. mva."/><link rel="stylesheet" href="styles.css"/></head><body><header class="topbar"><a class="brand" href="index.html"><span class="brand-mark">Ø</span><span>Økonomikalk</span></a></header><main class="funnel"><section class="hero"><p class="eyebrow">Gratis test</p><h1>Er timesprisen din for lav?</h1><p class="lead">Fyll inn ønsket inntekt, kostnader og fakturerbare timer. Få et raskt forslag til timespris eks. mva.</p></section><section class="panel"><form id="timesprisForm" class="form-grid"><label>Ønsket inntekt per år<input id="desiredIncome" type="number" value="650000" min="0" step="1000"></label><label>Driftskostnader per år<input id="costs" type="number" value="159000" min="0" step="1000"></label><label>Fakturerbare timer per uke<input id="hoursPerWeek" type="number" value="25" min="1" step="1"></label><label>Feriedager per år<input id="vacationDays" type="number" value="25" min="0" step="1"></label><label>Ekstra buffer<select id="bufferPercent"><option value="0">Ingen ekstra buffer</option><option value="5">5 % buffer</option><option value="10" selected>10 % buffer</option><option value="15">15 % buffer</option></select></label><div class="actions"><button class="btn primary" type="submit">Beregn timespris</button></div></form></section><section id="timesprisResult" class="result-card"></section></main><script src="app.js"></script><script>startTimesprisQuiz();</script></body></html>
